name: Nightly Update
on:
  schedule:
    - cron: '0 23 * * *'   # 6 PM CT
    - cron: '0 0 * * *'    # 7 PM CT
    - cron: '0 1 * * *'    # 8 PM CT
    - cron: '0 2 * * *'    # 9 PM CT
    - cron: '0 3 * * *'    # 10 PM CT
    - cron: '0 4 * * *'    # 11 PM CT
    - cron: '0 5 * * *'    # 12 AM CT
    - cron: '0 6 * * *'    # 1 AM CT
    - cron: '0 7 * * *'    # 2 AM CT (late west coast games)
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests openpyxl
      - run: python the_field_updater.py
      - run: |
          git config user.email "wrichter2005@gmail.com"
          git config user.name "wilrich18"
          git add *.html
          git diff --staged --quiet || git commit -m "nightly update"
          git push
