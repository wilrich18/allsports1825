name: Nightly Update
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests openpyxl
      - run: python the_field_updater.py
      - run: |
          git config user.email "wrichter2005@gmail.com"
          git config user.name "wilrich18"
          git add *.html
          git diff --staged --quiet || git commit -m "nightly update"
          git push
